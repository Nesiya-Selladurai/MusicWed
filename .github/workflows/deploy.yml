name: Build and Deploy to K3s

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v3

    - name: Login to GHCR
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set lower case owner name
      id: prep
      run: |
        echo "OWNER_LC=${OWNER,,}" >> $GITHUB_OUTPUT
      env:
        OWNER: '${{ github.repository_owner }}'

    - name: Build and push backend image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: ghcr.io/${{ steps.prep.outputs.OWNER_LC }}/music-app-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/master'

    steps:
    - uses: actions/checkout@v3

    - name: Deploy to K3s
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e

          # Work from the home directory so this works for any login user
          cd "$HOME"

          # If the repo isn't present, clone the latest snapshot (shallow)
          if [ ! -d "$HOME/MusicWed" ]; then
            git clone --depth 1 https://github.com/${{ github.repository }} "$HOME/MusicWed"
          fi

          cd "$HOME/MusicWed"
          git fetch --all
          git reset --hard origin/master

          # Ensure kubeconfig is readable by this user (k3s writes it as root-owned)
          sudo mkdir -p ~/.kube
          sudo cp /etc/rancher/k3s/k3s.yaml ~/.kube/config
          sudo chown $(id -u):$(id -g) ~/.kube/config

          # Create secrets if they don't exist
          kubectl create secret generic music-app-secrets \
            --from-literal=MONGO_URI="${{ secrets.MONGODB_URI }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Replace placeholder with actual repository owner in manifest
          export OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          sed -i "s/\${GITHUB_REPOSITORY_OWNER}/${OWNER_LC}/g" k8s/backend.yaml

          kubectl apply -f k8s/
          # Force rollout restart to pick up new image
          kubectl rollout restart deployment backend

          # Clean up so the next run starts from a fresh clone
          cd "$HOME"
          rm -rf "$HOME/MusicWed"
